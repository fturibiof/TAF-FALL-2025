
 server {
   include /etc/nginx/extra-conf.d/*.conf;

   listen 80;
   server_name frontend;

   location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html =404;
   }

    # Route /my-backend/oauth2/... → backend-team2 (OAuth2 authorization flow)
    location /my-backend/oauth2/ {
        rewrite /my-backend/(.*) /$1  break;
        proxy_pass ${BACKEND_URL};
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route /my-backend/api/... → backend-team2 (direct API calls, e.g. refresh-token)
    location /my-backend/api/ {
        rewrite /my-backend/(.*) /$1  break;
        proxy_pass ${BACKEND_URL};
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route /my-backend/team2/... → backend-team2 (strip /my-backend/team2)
    location /my-backend/team2/ {
        rewrite /my-backend/team2/(.*) /$1  break;
        proxy_pass ${BACKEND_URL};
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route /my-backend/auth/... → auth service (strip /my-backend/auth)
    location /my-backend/auth/ {
        rewrite /my-backend/auth/(.*) /$1  break;
        proxy_pass ${AUTH_URL};
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route /my-backend/user/... → user service (strip /my-backend/user)
    location /my-backend/user/ {
        rewrite /my-backend/user/(.*) /$1  break;
        proxy_pass ${USER_URL};
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

 }
