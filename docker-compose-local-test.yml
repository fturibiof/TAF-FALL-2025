networks:
  taf-local:
    driver: bridge

volumes:
  mongodb-data:

services:
  # ============================================
  # DATABASE LAYER
  # ============================================
  
  mongodb:
    image: mongo:latest
    container_name: taf-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongodb-data:/data/db
    networks:
      - taf-local
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: taf-mongo-express
    restart: unless-stopped
    ports:
      - "8881:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taf-local





  # ============================================
  # AUTHENTICATION SERVICE
  # ============================================
  
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: taf-auth
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      PORT_AUTH: 8080
      DB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin
      DB_AUTH: ${MONGO_ROOT_USERNAME}
      DB_NAME: ${MONGO_DB_NAME}
      API_TEST_TOKEN: ${JWT_SECRET}
      API_TEST_EXP_TIME: 86400000
      EUREKA_CLIENT_ENABLED: "false"
      LOG_ROOT: INFO
      LOG_WEB: INFO
      LOG_HIBERNATE: INFO
      LOG_FRAMEWORK: INFO
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taf-local
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # USER SERVICE
  # ============================================
  
  user:
    build:
      context: ./user
      dockerfile: Dockerfile.local
    container_name: taf-user
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      PORT_USER: 8080
      DB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin
      DB_AUTH: ${MONGO_ROOT_USERNAME}
      DB_NAME: ${MONGO_DB_NAME}
      API_TEST_TOKEN: ${JWT_SECRET}
      API_TEST_EXP_TIME: 86400000
      EUREKA_CLIENT_ENABLED: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taf-local
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # TESTING BACKEND - TEAM 1 (SELENIUM-TEST-SERVICE)
  # ============================================
  
  backend-team1:
    build:
      context: ./selenium-test-Service
      dockerfile: Dockerfile.local
    container_name: taf-backend-team1
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      SPRING_APPLICATION_NAME: team1
      SERVER_PORT: 8080
      DB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin
      DB_AUTH: ${MONGO_ROOT_USERNAME}
      DB_NAME: ${MONGO_DB_NAME}
      API_TEST_TOKEN: ${JWT_SECRET}
      API_TEST_EXP_TIME: 86400000
      EUREKA_CLIENT_ENABLED: "false"
      SELENIUM_URL: http://selenium-team1
      SELENIUM_PORT: 4444
      API_TEST_URL: http://testapi-team1
      API_TEST_PORT: 8080
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taf-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ============================================
  # TESTAPI - TEAM 2 (REST-Assured Test Executor)
  # ============================================
  
  testapi-team2:
    build:
      context: ./testapi-Service/testapi
      dockerfile: Dockerfile
    container_name: taf-testapi-team2
    restart: unless-stopped
    ports:
      - "8086:8082"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - taf-local
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8082/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ============================================
  # TESTING BACKEND - TEAM 2 (TESTAPI-SERVICE)
  # ============================================
  
  backend-team2:
    build:
      context: ./testapi-Service
      dockerfile: Dockerfile.local
    container_name: taf-backend-team2
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      SPRING_APPLICATION_NAME: team2
      SERVER_PORT: 8080
      EUREKA_CLIENT_ENABLED: "false"
      DB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin
      DB_AUTH: ${MONGO_ROOT_USERNAME}
      DB_NAME: ${MONGO_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_FRONTEND_REDIRECT_URL: http://localhost:4300
      SELENIUM_URL: http://selenium-team2
      SELENIUM_PORT: 4444
      TEST_API_SERVICE_URL: http://testapi-team2
      TEST_API_SERVICE_PORT: 8082
    depends_on:
      mongodb:
        condition: service_healthy
      testapi-team2:
        condition: service_started
    networks:
      - taf-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ============================================
  # TESTING BACKEND - TEAM 3 (TEST-PERFORMANCE-SERVICE)
  # ============================================
  
  backend-team3:
    build:
      context: ./test-performance-Service
      dockerfile: Dockerfile.local
    container_name: taf-backend-team3
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      SPRING_APPLICATION_NAME: team3
      SERVER_PORT: 8080
      DB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin
      DB_AUTH: ${MONGO_ROOT_USERNAME}
      DB_NAME: ${MONGO_DB_NAME}
      API_TEST_TOKEN: ${JWT_SECRET}
      API_TEST_EXP_TIME: 86400000
      EUREKA_CLIENT_ENABLED: "false"
      SELENIUM_URL: http://selenium-team3
      SELENIUM_PORT: 4444
      API_TEST_URL: http://testapi-team3
      API_TEST_PORT: 8080
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taf-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

        # ============================================
  # TEST GENERATION SERVICE - TEAM 3 (PYTHON + BAML)
  # ============================================

  test-generation-team3:
    build:
      context: ./test-performance-Service
      dockerfile: ./test-generation-service/Dockerfile
    container_name: taf-test-generation-team3
    restart: unless-stopped
    ports:
      - "8096:8090"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - taf-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # SELENIUM GRID - TEAM 1
  # ============================================
  
  selenium-team1:
    image: selenium/standalone-chrome:latest
    container_name: taf-selenium-team1
    restart: unless-stopped
    ports:
      - "4444:4444"
      - "7900:7900"  # VNC server for viewing tests
    shm_size: 2gb
    networks:
      - taf-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # SELENIUM GRID - TEAM 2
  # ============================================
  
  selenium-team2:
    image: selenium/standalone-chrome:latest
    container_name: taf-selenium-team2
    restart: unless-stopped
    ports:
      - "4445:4444"
      - "7901:7900"
    shm_size: 2gb
    networks:
      - taf-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # SELENIUM GRID - TEAM 3
  # ============================================
  
  selenium-team3:
    image: selenium/standalone-chrome:latest
    container_name: taf-selenium-team3
    restart: unless-stopped
    ports:
      - "4446:4444"
      - "7902:7900"
    shm_size: 2gb
    networks:
      - taf-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # FRONTEND - TEAM 1 (SELENIUM-TEST-SERVICE)
  # ============================================
  
  frontend-team1:
    build:
      context: ./selenium-test-Service
      dockerfile: frontend/Dockerfile
    container_name: taf-frontend-team1
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      API_BASE_URL: http://backend-team1:8080
    depends_on:
      - backend-team1
    networks:
      - taf-local

  # ============================================
  # FRONTEND - TEAM 2 (TESTAPI-SERVICE)
  # ============================================
  
  frontend-team2:
    build:
      context: ./testapi-Service
      dockerfile: frontend/Dockerfile
    container_name: taf-frontend-team2
    restart: unless-stopped
    ports:
      - "4300:80"
    environment:
      BACKEND_URL: http://backend-team2:8080
      AUTH_URL: http://auth:8080
      USER_URL: http://user:8080
    depends_on:
      - backend-team2
    networks:
      - taf-local

  # ============================================
  # FRONTEND - TEAM 3 (TEST-PERFORMANCE-SERVICE)
  # ============================================
  
  frontend-team3:
    build:
      context: ./test-performance-Service
      dockerfile: frontend/Dockerfile
    container_name: taf-frontend-team3
    restart: unless-stopped
    ports:
      - "4400:80"
    environment:
      API_BASE_URL: http://backend-team3:8080
    depends_on:
      - backend-team3
    networks:
      - taf-local

  # ============================================
  # MONITORING (Optional)
  # ============================================
  


