# Configuration JUnit 5 pour l'exécution parallèle des tests

# Active la parallélisation
junit.jupiter.execution.parallel.enabled = true

# Mode de parallélisation par défaut (concurrent)
junit.jupiter.execution.parallel.mode.default = concurrent

# Mode pour les classes (peut être same_thread ou concurrent)
junit.jupiter.execution.parallel.mode.classes.default = concurrent

# Stratégie de parallélisation
# - fixed: utilise un nombre fixe de threads (voir config.fixed.parallelism)
# - dynamic: adapte le nombre de threads selon les CPU disponibles (recommandé)
# - custom: utilise une stratégie personnalisée
junit.jupiter.execution.parallel.config.strategy = dynamic

# Facteur multiplicateur pour la stratégie dynamic (par défaut 1.0)
# 1.0 = 1 thread par CPU
# 2.0 = 2 threads par CPU
junit.jupiter.execution.parallel.config.dynamic.factor = 1.5

# Si vous utilisez la stratégie "fixed", décommentez la ligne suivante :
# junit.jupiter.execution.parallel.config.fixed.parallelism = 10
