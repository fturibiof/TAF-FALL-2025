spring.sql.init.mode=never 
spring.sql.init.platform=postgresql

# Active l'affichage des requêtes SQL dans les logs

# Autorise CORS pour toutes les origines (en développement seulement)
spring.web.cors.allowed-origin-patterns=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Définir le niveau des logs pour capturer les paramètres SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Définition du port
server.port=8085

